name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: img2cli-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: img2cli-windows.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: img2cli-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxcb1-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename Artifact
        shell: bash
        run: |
          mkdir -p target/release-dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv target/${{ matrix.target }}/release/img2cli.exe target/release-dist/${{ matrix.artifact_name }}
          else
            mv target/${{ matrix.target }}/release/img2cli target/release-dist/${{ matrix.artifact_name }}
          fi

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release-dist/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
