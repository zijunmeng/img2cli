name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release Tauri App
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Targets for macOS cross-compilation (Intel + Apple Silicon)
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev libxcb1-dev libxext-dev libxfixes-dev libxrandr-dev libegl-dev libgl1-mesa-dev libpipewire-0.3-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}

      - name: Rename Build Artifacts to Include 'v' Prefix
        shell: node {0}
        run: |
          const fs = require('fs');
          const path = require('path');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const ver = pkg.version;
          const targetVer = 'v' + ver;
          const searchDir = path.join('src-tauri', 'target', 'release', 'bundle');
          function walk(dir, files = []) {
            if (!fs.existsSync(dir)) return files;
            const list = fs.readdirSync(dir);
            for (const file of list) {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) walk(fullPath, files);
              else files.push(fullPath);
            }
            return files;
          }
          const files = walk(searchDir);
          for (const file of files) {
            const ext = path.extname(file);
            const base = path.basename(file, ext);
            const dir = path.dirname(file);
            if (base.includes(ver) && !base.includes(targetVer)) {
              const newBase = base.replace(ver, targetVer);
              const newPath = path.join(dir, newBase + ext);
              fs.renameSync(file, newPath);
              console.log('Renamed:', file, '->', newPath);
            }
          }

      # Portable (no-install) Windows build. The raw Tauri exe is self-contained
      # (frontend embedded; uses the system WebView2 runtime preinstalled on
      # Win10/11), so it runs green-portable — like wispterm's portable flavor.
      - name: Package Portable Binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path src-tauri/target/release/img2cli.exe -DestinationPath img2cli-${{ github.ref_name }}-windows-portable.zip

      - name: Upload Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'img2cli ${{ github.ref_name }}'
          body: 'Release version ${{ github.ref_name }} of the img2cli visual tray desktop application.'
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            img2cli-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
