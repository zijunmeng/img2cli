name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release Tauri App
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Targets for macOS cross-compilation (Intel + Apple Silicon)
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'img2cli v__VERSION__'
          releaseBody: 'Release version v__VERSION__ of the img2cli visual tray desktop application.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}

      # Step to package portable standalone binaries into zip files (similar to wispterm)
      - name: Package Portable Binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path src-tauri/target/release/img2cli.exe -DestinationPath src-tauri/target/release/img2cli-${{ github.ref_name }}-windows-amd64.zip

      - name: Package Portable Binary (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          tar -czf src-tauri/target/release/img2cli-${{ github.ref_name }}-linux-amd64.tar.gz -C src-tauri/target/release img2cli

      - name: Package Portable Binary (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          zip -j src-tauri/target/universal-apple-darwin/release/img2cli-${{ github.ref_name }}-macos-universal.zip src-tauri/target/universal-apple-darwin/release/img2cli

      # Upload portable zips to the release
      - name: Upload Portable Zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/*.zip
            src-tauri/target/release/*.tar.gz
            src-tauri/target/universal-apple-darwin/release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
